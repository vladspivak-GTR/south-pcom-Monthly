<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Individual Performance · Pcom South</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Outfit:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f1f5fb;--surface:#ffffff;--card:#ffffff;--border:#d6dfeb;
  --text:#0b1220;--text2:#2d3748;--text3:#5a6b85;
  --green:#047857;--emerald:#10b981;--blue:#1d4ed8;--purple:#6d28d9;--teal:#0d9488;
}
body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-weight:600;min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
.container{max-width:760px;margin:0 auto;padding:0 28px;flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center}
.header{padding:56px 0 8px;text-align:center}
.header h1{font-size:38px;font-weight:800;letter-spacing:-.04em;background:linear-gradient(135deg,var(--green),var(--emerald),var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header .sub{font-size:12px;color:var(--text3);font-weight:700;letter-spacing:3px;text-transform:uppercase;margin-top:8px}
.header-line{width:80px;height:3px;background:linear-gradient(90deg,var(--green),var(--emerald));margin:20px auto 0;border-radius:2px}
.coming{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:56px 48px;margin-top:40px;box-shadow:0 1px 3px rgba(15,23,42,.06),0 8px 28px rgba(15,23,42,.06);max-width:560px;animation:fadeUp .6s ease both}
.coming-icon{width:84px;height:84px;border-radius:24px;background:linear-gradient(135deg,var(--green),var(--emerald));display:flex;align-items:center;justify-content:center;font-size:40px;margin:0 auto 24px;box-shadow:0 12px 32px rgba(4,120,87,.22)}
.coming h2{font-size:24px;font-weight:800;letter-spacing:-.02em;margin-bottom:12px}
.coming p{font-size:14px;color:var(--text3);line-height:1.7;font-weight:600;max-width:420px;margin:0 auto}
.pill{display:inline-block;margin-top:24px;padding:8px 18px;border-radius:999px;background:rgba(4,120,87,.08);border:1px solid rgba(4,120,87,.18);color:var(--green);font-family:'Outfit',sans-serif;font-size:12px;font-weight:800;letter-spacing:1px;text-transform:uppercase}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.footer{text-align:center;padding:32px 0;color:var(--text3);font-size:12px;font-family:'Outfit',sans-serif}
.back-hub{position:fixed;top:20px;left:20px;z-index:9999;display:flex;align-items:center;gap:8px;padding:10px 18px;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:12px;color:var(--text2);font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:700;text-decoration:none;transition:all .25s}
.back-hub:hover{color:var(--text);border-color:rgba(4,120,87,.3);background:#ffffff}
.back-hub svg{width:16px;height:16px;flex-shrink:0}
</style>
</head>
<body>
<a href="index.html" class="back-hub"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>Hub</a>

<div class="header">
  <h1>Individual Performance</h1>
  <div class="sub">Pcom South · Media Buyer Results</div>
  <div class="header-line"></div>
</div>

<div class="container">
  <div class="coming">
    <div class="coming-icon">👤</div>
    <h2>Coming Soon</h2>
    <p>This dashboard will track each media buyer's performance vs goals — individual profit, targets, achievement rate and monthly trends. Content is being prepared.</p>
    <div class="pill">In Preparation</div>
  </div>
</div>

<div class="footer">Pcom South · Individual Performance · 2026</div>
</body>
</html>
